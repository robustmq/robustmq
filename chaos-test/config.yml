chaosd:
  endpoint: "http://127.0.0.1:31767"

sdk_matrix:
  p0:
    - sdk: python
      version: "3.11"
      scenarios: [basic-pubsub]
    - sdk: go
      version: "1.21"
      scenarios: [basic-pubsub]
  p1:
    - sdk: python
      versions: ["3.10", "3.11", "3.12"]
      scenarios: [basic-pubsub, failover]
    - sdk: rust
      version: "1.70"
      scenarios: [basic-pubsub, failover]
  p2:
    - sdk: python
      versions: ["3.10", "3.11", "3.12"]
    - sdk: go
      versions: ["1.20", "1.21"]
    - sdk: rust
      versions: ["1.70", "1.75"]
    - sdk: java
      versions: ["11", "17", "21"]

github:
  reports_repo: "git@github.com:<your-org>/test-reports.git"
  deploy_key_path: "~/.ssh/test-reports-deploy"
  branch: "main"
