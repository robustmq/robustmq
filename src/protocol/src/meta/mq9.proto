syntax = "proto3";
package meta.service.mq9;

import "meta/validate.proto";

service Mq9Service {
  rpc CreateMail(CreateMailRequest) returns (CreateMailReply) {}
  rpc DeleteMail(DeleteMailRequest) returns (DeleteMailReply) {}
  rpc ListMail(ListMailRequest) returns (stream ListMailReply) {}
}

message CreateMailRequest {
  string tenant = 1 [(validate.rules).string.min_len = 1];
  bytes content = 2 [(validate.rules).bytes.min_len = 1];
}

message CreateMailReply {}

message DeleteMailRequest {
  string tenant = 1 [(validate.rules).string.min_len = 1];
  string mail_address = 2 [(validate.rules).string.min_len = 1];
}

message DeleteMailReply {}

message ListMailRequest {
  string tenant = 1;
}

message ListMailReply {
  bytes mail = 1;
}
