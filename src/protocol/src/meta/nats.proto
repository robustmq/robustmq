syntax = "proto3";
package meta.service.nats;

import "meta/validate.proto";

service NatsService {
  rpc CreateNatsSubscribe(CreateNatsSubscribeRequest) returns (CreateNatsSubscribeReply) {}
  rpc DeleteNatsSubscribe(DeleteNatsSubscribeRequest) returns (DeleteNatsSubscribeReply) {}
  rpc ListNatsSubscribe(ListNatsSubscribeRequest) returns (stream ListNatsSubscribeReply) {}
}

message CreateNatsSubscribeRequest {
  string tenant = 1 [(validate.rules).string.min_len = 1];
  repeated bytes subscribes = 2;
}

message CreateNatsSubscribeReply {}

message DeleteNatsSubscribeRequest {
  string tenant = 1 [(validate.rules).string.min_len = 1];
  repeated NatsSubscribeKey keys = 2;
}

message NatsSubscribeKey {
  uint64 connect_id = 1;
  string sid = 2;
}

message DeleteNatsSubscribeReply {}

message ListNatsSubscribeRequest {
  string tenant = 1;
  uint64 connect_id = 2;
}

message ListNatsSubscribeReply {
  bytes subscribe = 1;
}
